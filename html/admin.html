<!DOCTYPE html>
<html lang="zh-cn">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理员界面</title>
    <link rel="stylesheet" href="../css/style.css">
</head>

<body>
    <header>
        <nav>
            <ul>
                <li><a href="./index.html">首页</a></li>
                <li><a href="./intro.html">介绍</a></li>
                <li><a href="./about.html">关于</a></li>
                <li><a href="./contact.html">联系</a></li>
                <li><a href="./admin.html">管理端</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <h1>管理员界面</h1>
        <p>用于查看员工账号状态、解除锁定、重置密码。</p>

        <section id="adminLoginCard" class="panel">
            <h2>管理员登录</h2>
            <form id="adminLoginForm" class="form-grid compact">
                <label for="adminUsername">账号</label>
                <input id="adminUsername" type="text" value="admin" required>

                <label for="adminPassword">密码</label>
                <input id="adminPassword" type="password" placeholder="请输入管理员密码"
                    pattern="(?=.*[A-Za-z])(?=.*\d)[A-Za-z\d]+" title="必须同时包含字母和数字，且只能包含字母和数字" required>

                <button type="submit">登录</button>
            </form>
            <p class="hint">默认账号: admin / Admin123（可用环境变量覆盖）</p>
            <p id="adminLoginMessage" class="message"></p>

            <h3>管理员注册</h3>
            <form id="adminRegisterForm" class="form-grid compact">
                <label for="adminRegisterUsername">账号</label>
                <input id="adminRegisterUsername" type="text" placeholder="例如 A1001" required>

                <label for="adminRegisterPassword">密码</label>
                <input id="adminRegisterPassword" type="password" minlength="8" placeholder="请输入至少8位密码"
                    pattern="(?=.*[A-Za-z])(?=.*\d)[A-Za-z\d]+" title="必须同时包含字母和数字，且只能包含字母和数字" required>

                <button type="submit">注册管理员</button>
            </form>
            <p id="adminRegisterMessage" class="message"></p>
        </section>

        <section id="adminPanel" class="panel hidden">
            <div class="dashboard-header">
                <h2>员工账号管理</h2>
                <button id="adminLogoutBtn" type="button">退出管理员</button>
            </div>

            <div class="toolbar">
                <button id="refreshEmployeesBtn" type="button">刷新列表</button>
                <input id="resetPasswordInput" type="password" minlength="8" placeholder="输入重置后的新密码（至少8位）"
                    pattern="(?=.*[A-Za-z])(?=.*\d)[A-Za-z\d]+" title="必须同时包含字母和数字，且只能包含字母和数字" required>
            </div>

            <p id="adminActionMessage" class="message"></p>

            <table>
                <thead>
                    <tr>
                        <th>工号</th>
                        <th>部门</th>
                        <th>岗位</th>
                        <th>登录状态</th>
                        <th>失败次数</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody id="employeeAdminTableBody">
                </tbody>
            </table>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 我的完整网站</p>
    </footer>

    <script src="../js/admin.js"></script>
</body>

</html>
